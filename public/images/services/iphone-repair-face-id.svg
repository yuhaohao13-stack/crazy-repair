<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- 装饰圆点 -->
  <circle cx="100" cy="100" r="80" fill="#60a5fa" opacity="0.05"/>
  <circle cx="650" cy="500" r="120" fill="#60a5fa" opacity="0.05"/>
  <circle cx="700" cy="100" r="50" fill="#60a5fa" opacity="0.08"/>
  
  <!-- 品牌标识 -->
  <g transform="translate(400, 35)">
    <rect x="-100" y="-18" width="200" height="36" rx="18" fill="#60a5fa" opacity="0.2"/>
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#60a5fa" dy="4">Apple iPhone (苹果)</text>
  </g>
  
  <!-- 设备主体 -->
  <g transform="translate(400,280)">
    <!-- 手机外壳 -->
    <rect x="-100" y="-180" width="200" height="360" rx="30" fill="#1f2937" stroke="#60a5fa" stroke-width="2"/>
    <!-- 屏幕 -->
    <rect x="-85" y="-160" width="170" height="300" rx="15" fill="#111827"/>
    <!-- 屏幕内容 -->
    <rect x="-60" y="-130" width="120" height="40" rx="5" fill="#374151"/>
    <circle cx="-40" cy="-80" r="20" fill="#374151"/>
    <rect x="-10" y="-90" width="60" height="20" rx="3" fill="#374151"/>
    <circle cx="-40" cy="-30" r="15" fill="#374151"/>
    <rect x="-15" y="-40" width="50" height="15" rx="3" fill="#374151"/>
    <!-- 底部按钮 -->
    <rect x="-15" y="140" width="30" height="8" rx="4" fill="#374151"/>
    <!-- 顶部刘海/灵动岛 -->
    <rect x="-40" y="-170" width="80" height="20" rx="10" fill="#111827"/>
  </g>
  
  <!-- 维修覆盖层 -->
  <g transform="translate(400,130)">
    <!-- 人脸轮廓 -->
    <circle cx="0" cy="-15" r="40" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- 眼睛 -->
    <circle cx="-15" cy="-25" r="5" fill="white"/>
    <circle cx="15" cy="-25" r="5" fill="white"/>
    <!-- 嘴巴 -->
    <path d="M-15,-5 Q0,10 15,-5" fill="none" stroke="white" stroke-width="2"/>
    <!-- 扫描线 -->
    <line x1="-55" y1="-15" x2="-35" y2="-15" stroke="#60a5fa" stroke-width="3" opacity="0.8"/>
    <line x1="35" y1="-15" x2="55" y2="-15" stroke="#60a5fa" stroke-width="3" opacity="0.8"/>
    <line x1="-45" y1="-35" x2="-35" y2="-35" stroke="#60a5fa" stroke-width="3" opacity="0.8"/>
    <line x1="35" y1="-35" x2="45" y2="-35" stroke="#60a5fa" stroke-width="3" opacity="0.8"/>
    <!-- 指纹 -->
    <g transform="translate(0, 50)">
      <path d="M-15,0 Q0,-10 15,0 Q20,10 10,15" fill="none" stroke="white" stroke-width="1.5"/>
      <path d="M-20,5 Q0,-15 20,5 Q25,20 5,25" fill="none" stroke="white" stroke-width="1.5"/>
    </g>
    <g transform="translate(0, 110)">
      <rect x="-80" y="-15" width="160" height="30" rx="8" fill="#60a5fa" opacity="0.9"/>
      <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="white" dy="5">👤 面容/指纹 Face ID</text>
    </g>
  </g>
  
  <!-- 底部信息 -->
  <g transform="translate(400, 565)">
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">面容/指纹修复 · Face ID Repair</text>
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569" y="16">Crazy维修 · 免费检测 · 30天质保 · 2007年至今</text>
  </g>
</svg>